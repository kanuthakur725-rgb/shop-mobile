<!DOCTYPE html>
<html>
<head>
    <title>Phone Hub - Mobile Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        header {
            background-color: #000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #ff6600;
            padding: 10px;
            text-align: center;
        }

        
        .container {
            padding: 20px;
            text-align: center;
        }

        .product {
            background: white;
            display: inline-block;
            width: 300px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        .offer {
            color: red;
            font-weight: bold;
            font-size: 18px;
        }

        button {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e65c00;
        }

        footer {
            background-color: #000;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>📱 Phone Hub</h1>
    <p>Best Mobile Deals & Offers</p>
</header>


<div class="container">

    <h2>🔥 Special Offers 🔥</h2>

    <div class="product">
        <img src="https://m.media-amazon.com/images/I/71d7rfSl0wL._SX679_.jpg" alt="iPhone 15">
        <h3>iPhone 15</h3>
        <p>Price: ₹79,999</p>
        <p class="offer">Offer: 10% OFF + Free Earbuds 🎧</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://m.media-amazon.com/images/I/81vxWpPpgNL._SX679_.jpg" alt="Samsung Galaxy S23">
        <h3>Samsung Galaxy S23</h3>
        <p>Price: ₹74,999</p>
        <p class="offer">Offer: 15% OFF + Exchange Bonus 💥</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://m.media-amazon.com/images/I/71ZDY57yTQL._SX679_.jpg" alt="OnePlus 11">
        <h3>OnePlus 11</h3>
        <p>Price: ₹56,999</p>
        <p class="offer">Offer: Flat ₹5000 Discount 🎉</p>
        <button>Buy Now</button>
    </div>

</div>

<footer>
    <p>© 2026 Phone Hub | All Rights Reserved</p>
</footer>

</body>
</html>
